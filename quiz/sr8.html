<!DOCTYPE html>
<html>

<head>
     <title>Quiz Portefølje Salg</title>
     <link rel="stylesheet"
           href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
     <link rel="stylesheet"
           href="styles.css">
     <link rel="icon"
           href="favicon.svg">
     <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
     <script id="MathJax-script"
             async
             src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
     <script>
          window.MathJax = {
               tex: {
                    inlineMath: [['$', '$']],
                    displayMath: [['$$', '$$']]
               },
               svg: {
                    scale: 0.9,
               },
               chtml: {
                    scale: 0.9,
               }
          };
     </script>
     <link rel="stylesheet"
           href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
     <style>
          .card-body {
               font-size: 1em;
          }

          .card img {
               max-width: 100%;
               height: auto;
          }
     </style>
</head>

<body data-formål="Forståelse af performance management og salgsmåling."
     data-forudsætning="Kendskab til avanceret salgsledelse.">
     <header> <a href="index.html"
             target="_blank"><img src="tepedulogoanim.svg"
                    alt="Logo"
                    width="8%"></a>
          <h2>Quiz Portefølje Salg</h2>
     </header>


     <div class="container">
          <div class="row justify-content-center">
               <div class="col-12 col-md-12 col-lg-12">
                    <div class="card mt-5">
                         <div class="card-body">

                              <div id="postProgressContent" class="mt-4" style="color: rgb(255, 255, 255);">
                                   <div>
                                        <h1>
                                             Salgsteknikker: Portefølje Salg
                                        </h1>
                                   </div>
                              </div>

                              <br>
                              <br>

                              <h1 id="question"
                                  class="card-title"></h1>
                              <div id="options"
                                   class="mt-4"></div>
                              <div id="progress-bar"
                                   class="progress-bar-container"></div>

                                <!-- 1 -->
                                <div class="question"
                                     data-question="Hvad er det primære fokus i portefølje salg?"
                                     data-answer="1"
                                     data-explanation="Portefølje salg handler om at udvikle og vedligeholde langsigtede relationer med eksisterende kunder for at maksimere deres livstidsværdi (CLV), frem for kun at fokusere på at skaffe nye kunder.<br><br>Det bygger på princippet om, at det ofte er mere omkostningseffektivt at sælge mere til eksisterende kunder end at skaffe nye.">
                                     <div class="option" data-option="At skaffe så mange nye kunder som muligt"></div>
                                     <div class="option" data-option="At udvikle og vedligeholde langsigtede kunderelationer"></div>
                                     <div class="option" data-option="At sælge standardiserede produkter billigst muligt"></div>
                                     <div class="option" data-option="At afslutte salg så hurtigt som muligt"></div>
                                </div>

                                <!-- 2 -->
                                <div class="question"
                                     data-question="Hvad betyder 'Share-of-Wallet' i porteføljesalgs-sammenhæng?"
                                     data-answer="3"
                                     data-explanation="Share-of-Wallet refererer til den andel af en kundes samlede forbrug inden for en bestemt kategori (f.eks. finansielle ydelser), som går til én specifik virksomhed.<br><br>Et centralt mål i porteføljesalg er at øge denne andel hos eksisterende kunder ved at dække flere af deres behov.">
                                     <div class="option" data-option="Den samlede værdi af kundens portefølje"></div>
                                     <div class="option" data-option="Antallet af produkter kunden har"></div>
                                     <div class="option" data-option="Kundens potentiale for fremtidige køb"></div>
                                     <div class="option" data-option="Andelen af kundens samlede forbrug i en kategori, der går til virksomheden"></div>
                                </div>

                                <!-- 3 -->
                                <div class="question"
                                     data-question="Hvilket princip understreger, at en stor del af omsætningen ofte kommer fra en lille del af kunderne?"
                                     data-answer="0"
                                     data-explanation="Pareto-princippet (80/20-reglen) illustrerer, at ca. 80% af resultaterne (f.eks. omsætning) ofte kommer fra ca. 20% af indsatsen (f.eks. kunderne), hvilket understreger vigtigheden af at fokusere på nøglekunder.">
                                     <div class="option" data-option="Pareto-princippet (80/20-reglen)"></div>
                                     <div class="option" data-option="Customer Lifetime Value (CLV)"></div>
                                     <div class="option" data-option="Key Account Management"></div>
                                     <div class="option" data-option="Kundesegmentering"></div>
                                </div>

                                <!-- 4 -->
                                <div class="question"
                                     data-question="Hvad er formålet med kundesegmentering (f.eks. A-, B-, C-, D-kunder)?"
                                     data-answer="2"
                                     data-explanation="Kundesegmentering bruges til at kategorisere kunder baseret på f.eks. værdi og potentiale, så virksomheden kan differentiere serviceniveauet og allokere ressourcerne mest effektivt.">
                                     <div class="option" data-option="At give alle kunder præcis den samme service"></div>
                                     <div class="option" data-option="At identificere kunder, der skal afvises"></div>
                                     <div class="option" data-option="At differentiere serviceniveau og ressourceallokering"></div>
                                     <div class="option" data-option="At beregne den samlede kundeværdi"></div>
                                </div>

                                <!-- 5 -->
                                <div class="question"
                                     data-question="Hvilken servicestrategi anvendes typisk for A-kunder (nøglekunder)?"
                                     data-answer="1"
                                     data-explanation="A-kunder, som er de mest værdifulde og strategisk vigtige, får typisk den højeste grad af service, herunder en dedikeret rådgiver, proaktiv kontakt, skræddersyede løsninger og strategiske drøftelser.<br><br>Man investerer mest i de kunder, der giver størst værdi.">
                                     <div class="option" data-option="Primært digitaliseret service og selvbetjening"></div>
                                     <div class="option" data-option="Dedikeret rådgiver, proaktiv kontakt og skræddersyede løsninger"></div>
                                     <div class="option" data-option="Teambaseret service med periodisk kontakt"></div>
                                     <div class="option" data-option="Standardiserede løsninger og reaktiv support"></div>
                                </div>

                                <!-- 6 -->
                                <div class="question"
                                     data-question="Hvad er et centralt mål ved at servicere B-kunder (vækst-kunder)?"
                                     data-answer="3"
                                     data-explanation="B-kunder har potentiale for vækst. Målet er derfor, udover at vedligeholde relationen, at øge deres værdi for virksomheden, f.eks. ved at øge share-of-wallet eller hjælpe dem med at udvikle deres forretning (hvis B2B).<br><br>Man forsøger at udvikle dem til fremtidige A-kunder.">
                                     <div class="option" data-option="At minimere serviceomkostningerne"></div>
                                     <div class="option" data-option="At flytte dem til digital selvbetjening"></div>
                                     <div class="option" data-option="At fastholde dem med standardiserede løsninger"></div>
                                     <div class="option" data-option="At øge deres værdi og share-of-wallet"></div>
                                </div>

                            

                                <!-- 9 -->
                                <div class="question"
                                     data-question="Hvad er formålet med at bruge en 'Produktdækningsmatrix'?"
                                     data-answer="1"
                                     data-explanation="En produktdækningsmatrix visualiserer, hvilke produkter eller ydelser en kunde allerede har, og hvilke de ikke har, men potentielt kunne have behov for.<br><br>Dette hjælper med systematisk at identificere muligheder for mersalg (krydssalg) og øge share-of-wallet (gap-analyse).">
                                     <div class="option" data-option="At beregne kundens samlede rentabilitet"></div>
                                     <div class="option" data-option="At identificere muligheder for mersalg (gap-analyse)"></div>
                                     <div class="option" data-option="At planlægge den næste kontakt med kunden"></div>
                                     <div class="option" data-option="At sammenligne kunden med andre i samme segment"></div>
                                </div>

                                <!-- 10 -->
                                <div class="question"
                                     data-question="Hvilket værktøj bruges til at lave en langsigtet handlingsplan for de vigtigste kunder?"
                                     data-answer="3"
                                     data-explanation="En Key Account Plan er en detaljeret strategisk plan (typisk 12-24 måneder) for, hvordan man vil udvikle relationen og forretningen med en specifik nøglekunde (A-kunde).">
                                     <div class="option" data-option="CRM-systemet"></div>
                                     <div class="option" data-option="Kunde-rentabilitetsanalyse"></div>
                                     <div class="option" data-option="Produktdækningsmatrix"></div>
                                     <div class="option" data-option="Key Account Plan"></div>
                                </div>

                                <!-- 11 -->
                                <div class="question"
                                     data-question="Hvad er en typisk konsekvens af en reaktiv (i stedet for proaktiv) tilgang til kundeporteføljen?"
                                     data-answer="0"
                                     data-explanation="En reaktiv tilgang, hvor man kun reagerer på kundens henvendelser, fører ofte til, at man går glip af muligheder for mersalg, rådgivning eller at løse problemer, før de opstår.<br><br>Man risikerer at miste kunder til konkurrenter, der er mere proaktive, og man udnytter ikke det fulde potentiale i porteføljen.">
                                     <div class="option" data-option="At man går glip af muligheder for mersalg og dybere relationer"></div>
                                     <div class="option" data-option="At man bruger for mange ressourcer på kunderne"></div>
                                     <div class="option" data-option="At kunderne bliver overserviceret"></div>
                                     <div class="option" data-option="At man får for mange C-kunder"></div>
                                </div>

                                <!-- 12 -->
                                <div class="question"
                                     data-question="Hvordan kan en bank proaktivt bruge viden om kundens livsfase til at øge share-of-wallet?"
                                     data-answer="1"
                                     data-explanation="Ved at kende kundens livsfase (f.eks. etablering med boligkøb, familieforøgelse, seniorliv) kan banken proaktivt tilbyde relevante, relaterede produkter (f.eks. forsikringspakke ved boligkøb, børneopsparing ved familieforøgelse, pensions- og arveplanlægning for seniorer) udover det primære produkt.<br><br>Det viser relevans og timing i rådgivningen.">
                                     <div class="option" data-option="Ved at vente på, at kunden selv spørger efter nye produkter"></div>
                                     <div class="option" data-option="Ved at tilbyde relevante, relaterede produkter på det rigtige tidspunkt"></div>
                                     <div class="option" data-option="Ved at give alle kunder de samme standardtilbud"></div>
                                     <div class="option" data-option="Ved kun at fokusere på det produkt, kunden oprindeligt efterspurgte"></div>
                                </div>

                                <!-- 13 -->
                                <div class="question"
                                     data-question="Hvad er Customer Lifetime Value (CLV)?"
                                     data-answer="2"
                                     data-explanation="CLV er et estimat af den samlede nettofortjeneste, en virksomhed forventer at opnå fra en kunde gennem hele den periode, de er kunde. Det flytter fokus fra den enkelte transaktion til den langsigtede værdi af relationen.">
                                     <div class="option" data-option="Værdien af kundens første køb"></div>
                                     <div class="option" data-option="Antallet af år kunden har været kunde"></div>
                                     <div class="option" data-option="Den samlede forventede nettofortjeneste fra en kunde over tid"></div>
                                     <div class="option" data-option="Kundens nuværende årlige omsætning"></div>
                                </div>

                               







                              























                         </div>
                    </div>
               </div>
          </div>
     </div>

     <script src="script.js">
     </script>
</body>

</html>
