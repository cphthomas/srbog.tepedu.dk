                              <div class="question"
                                   data-question="Hvad er hovedformålet med klassisk salg i finanssektoren?"
                                   data-answer="0"
                                   data-explanation="Ifølge materialet er klassisk salg i finanssektoren primært fokuseret på at opbygge langvarige kunderelationer gennem tillid, grundig behovsafdækning og skræddersyede løsninger. Dette adskiller sig fra mere transaktionsorienterede salgstilgange, der fokuserer på hurtige salg.<br><br>
                                        Eksempel: En bankrådgiver, der bruger klassisk salg i forbindelse med boligrådgivning, vil ikke blot forsøge at sælge kunden et lån hurtigst muligt, men vil først etablere en tryg relation, afdække kundens behov grundigt og præsentere skræddersyede løsninger, der passer til kundens specifikke situation.<br><br>
                                        <table class='info-table'w-100'>
                                             <tr><th>Fokusområde</th><th>Beskrivelse</th></tr>
                                             <tr><td>Tillid</td><td>Etablering af troværdig relation til kunden</td></tr>
                                             <tr><td>Behovsafdækning</td><td>Grundig udforskning af kundens situation</td></tr>
                                             <tr><td>Skræddersyede løsninger</td><td>Tilpasning af produkter til kundens specifikke behov</td></tr>
                                        </table><br><br>
                                        Denne tilgang er særligt vigtig i finanssektoren, hvor produkterne ofte er komplekse, købsbeslutningerne har stor økonomisk betydning, og hvor relationen mellem rådgiver og kunde typisk strækker sig over mange år.">

                                   <div class="option"
                                        data-option="At sælge de dyreste finansielle produkter til flest mulige kunder"></div>
                                   <div class="option"
                                        data-option="At minimere tiden brugt på hver enkelt kunde"></div>
                              </div>
                              
                              <!-- 2 -->
                              <div class="question"
                                   data-question="Hvilke fem faser indgår i klassisk salg?"
                                   data-answer="1"
                                   data-explanation="De fem faser i klassisk salg er: Kontakt, Behovsafdækning, Løsningspræsentation, Indvendinger og Afslutning. Disse faser udgør en struktureret tilgang til salgsprocessen.<br><br>
                                        Eksempel: I en samtale om boliglån kunne faserne udspille sig sådan:<br>
                                        <ul>
                                             <li><strong>Kontakt:</strong> Rådgiveren byder velkommen og skaber en tryg atmosfære</li>
                                             <li><strong>Behovsafdækning:</strong> 'Hvilke områder kigger I på?' 'Hvordan ser jeres økonomi ud på længere sigt?'</li>
                                             <li><strong>Løsningspræsentation:</strong> Gennemgang af forskellige lånetyper med konkrete beregninger</li>
                                             <li><strong>Indvendinger:</strong> Håndtering af bekymringer om f.eks. variabel rente</li>
                                             <li><strong>Afslutning:</strong> Aftale om forhåndsgodkendelse og plan for det videre forløb</li>
                                        </ul><br>
                                        <table class='info-table'w-100'>
                                             <tr><th>Fase</th><th>Formål</th></tr>
                                             <tr><td>Kontakt</td><td>Etablere første kontakt og skabe tryghed</td></tr>
                                             <tr><td>Behovsafdækning</td><td>Forstå kundens situation og behov</td></tr>
                                             <tr><td>Løsningspræsentation</td><td>Præsentere relevante finansielle løsninger</td></tr>
                                             <tr><td>Indvendinger</td><td>Håndtere bekymringer og spørgsmål</td></tr>
                                             <tr><td>Afslutning</td><td>Guide mod beslutning og aftale næste skridt</td></tr>
                                        </table><br><br>
                                        Denne struktur har rødder i tidlige salgsmodeller som AIDA (Attention, Interest, Desire, Action) fra starten af 1900-tallet, men lægger mere vægt på dialog og behov.">
                                   <div class="option"
                                        data-option="Præsentation, Pitching, Forhandling, Lukning, Opfølgning"></div>
                                   <div class="option"
                                        data-option="Kontakt, Behovsafdækning, Løsningspræsentation, Indvendinger, Afslutning"></div>
                                   <div class="option"
                                        data-option="Introduktion, Analyse, Tilbud, Bekræftelse, Signering"></div>
                                   <div class="option"
                                        data-option="Møde, Dialog, Anbefaling, Kontrakt, Service"></div>

                              <!-- 3 -->
                              <div class="question"
                                   data-question="Hvad er hovedformålet med fasen 'Behovsafdækning' i klassisk salg?"
                                   data-answer="1"
                                   data-explanation="Hovedformålet med behovsafdækningsfasen er at forstå kundens situation og behov gennem åbne spørgsmål, aktiv lytning og notetagning. Dette er en kritisk fase, da den danner grundlag for de efterfølgende faser.<br><br>
                                        I denne fase bruger rådgiveren typisk åbne spørgsmål som 'Hvad er jeres planer for fremtiden?', 'Hvordan ser I jeres økonomiske situation udvikle sig?' eller 'Hvilke bekymringer har I omkring jeres investering?'<br><br>
                                        Eksempel fra investeringsrådgivning: En rådgiver spørger ind til kundens tidshorisont, risikovillighed, mål for investeringen og nuværende økonomiske situation for at kunne præsentere en relevant og skræddersyet investeringsløsning senere i processen.<br><br>
                                        <table class='info-table'w-100'>
                                             <tr><th>Teknik</th><th>Formål</th><th>Eksempel</th></tr>
                                             <tr><td>Åbne spørgsmål</td><td>Få uddybende svar</td><td>'Hvordan ser I jeres økonomi om 5 år?'</td></tr>
                                             <tr><td>Aktiv lytning</td><td>Vise interesse og fange nuancer</td><td>Parafrasere kundens svar for at bekræfte forståelse</td></tr>
                                             <tr><td>Notetagning</td><td>Dokumentere vigtige informationer</td><td>Bruge et aktivt lyttekort til at strukturere noter</td></tr>
                                        </table><br><br>
                                        En grundig behovsafdækning er afgørende for at undgå fejl som overfladisk afdækning, der kan føre til forkerte produktanbefalinger.">
                                   <div class="option"
                                        data-option="At præsentere alle tilgængelige finansielle produkter"></div>
                                   <div class="option"
                                        data-option="At forstå kundens situation og behov gennem åbne spørgsmål"></div>
                                   <div class="option"
                                        data-option="At overbevise kunden om fordelene ved et specifikt produkt"></div>
                                   <div class="option"
                                        data-option="At gennemgå alle juridiske aspekter af finansielle aftaler"></div>
                              </div>
                              
                              <!-- 4 -->
                              <div class="question"
                                   data-question="Hvad er en typisk fejl i fasen 'Løsningspræsentation'?"
                                   data-answer="2"
                                   data-explanation="En typisk fejl i løsningspræsentationsfasen er at fokusere for meget på produktdetaljer, hvilket kan føre til, at kunden mister overblikket. I stedet bør man fokusere på de relevante fordele for kunden.<br><br>
                                        Eksempel: En investeringsrådgiver, der præsenterer en investeringsløsning ved at gennemgå alle tekniske detaljer om forskellige værdipapirer, omkostningsstrukturer og handelsmekanismer, risikerer at overvælde kunden med information. I stedet bør rådgiveren fokusere på, hvordan investeringen hjælper kunden med at nå sine mål, f.eks. 'Denne portefølje er designet til at give dig en stabil indtægt i pensionsalderen, samtidig med at den beskytter din kapital mod inflation.'<br><br>
                                        <table class='info-table'w-100'>
                                             <tr><th>Fejl</th><th>Konsekvens</th><th>Bedre tilgang</th></tr>
                                             <tr><td>For mange produktdetaljer</td><td>Kunden mister overblik</td><td>Fokusere på relevante fordele for kunden</td></tr>
                                             <tr><td>Standardpræsentation til alle</td><td>Løsningen virker ikke skræddersyet</td><td>Tilpasse præsentationen til kundens behov</td></tr>
                                             <tr><td>Fagsprog og jargon</td><td>Kunden forstår ikke budskabet</td><td>Bruge et klart og enkelt sprog</td></tr>
                                        </table><br><br>
                                        Denne indsigt er baseret på afsnittet 'Typiske Fejl at Undgå' i materialet, som understreger vigtigheden af kundefokuseret kommunikation i stedet for produktfokuseret kommunikation.">
                                   <div class="option"
                                        data-option="At præsentere for få produkter"></div>
                                   <div class="option"
                                        data-option="At tale for langsomt"></div>
                                   <div class="option"
                                        data-option="At fokusere for meget på produktdetaljer frem for kundens fordele"></div>
                                   <div class="option"
                                        data-option="At bruge for få visuelle hjælpemidler"></div>
                              </div>
                              
                              <!-- 5 -->
                              <div class="question"
                                   data-question="Hvad er FAB-analyse, og hvordan anvendes den i klassisk salg?"
                                   data-answer="3"
                                   data-explanation="FAB-analyse står for Feature (egenskab), Advantage (fordel) og Benefit (gevinst) og anvendes til at strukturere præsentationen af produktfordele i løsningspræsentationsfasen.<br><br>
                                        Eksempel fra finanssektoren: Ved præsentation af et fastforrentet lån kan rådgiveren bruge FAB-metoden således:<br>
                                        <ul>
                                             <li><strong>Feature (egenskab):</strong> Fast rente på 3% i hele lånets løbetid</li>
                                             <li><strong>Advantage (fordel):</strong> Din månedlige ydelse ændrer sig ikke, uanset hvad der sker med markedsrenten</li>
                                             <li><strong>Benefit (gevinst):</strong> Du får økonomisk tryghed og kan nemt planlægge dit budget i hele lånets løbetid</li>
                                        </ul><br>
                                        <table class='info-table'w-100'>
                                             <tr><th>Element</th><th>Beskrivelse</th><th>Finansielt eksempel</th></tr>
                                             <tr><td>Feature</td><td>Produktets egenskab</td><td>Fast rente</td></tr>
                                             <tr><td>Advantage</td><td>Hvad egenskaben gør</td><td>Forudsigelig ydelse</td></tr>
                                             <tr><td>Benefit</td><td>Hvordan kunden får gavn af det</td><td>Tryghed i privatøkonomien</td></tr>
                                        </table><br><br>
                                        FAB-analysen hjælper rådgiveren med at oversætte tekniske produktegenskaber til konkrete fordele, som kunden kan relatere til. Det er særligt vigtigt i finanssektoren, hvor produkterne ofte er komplekse og abstrakte.">
                                   <div class="option"
                                        data-option="En metode til at vurdere kundens kreditværdighed"></div>
                                   <div class="option"
                                        data-option="Et værktøj til at beregne afkast på investeringer"></div>
                                   <div class="option"
                                        data-option="En teknik til at håndtere kundeindvendinger"></div>
                                   <div class="option"
                                        data-option="En metode til at strukturere præsentation af produktfordele (Feature, Advantage, Benefit)"></div>
                              </div>
                              
                              <!-- 6 -->
                              <div class="question"
                                   data-question="Hvilke særlige hensyn skal man være opmærksom på ved klassisk salg i finanssektoren?"
                                   data-answer="0"
                                   data-explanation="Ved klassisk salg i finanssektoren skal man være særligt opmærksom på: regulatoriske krav, etiske hensyn, produktkompleksitet og det langsigtede perspektiv.<br><br>
                                        Disse hensyn er særligt vigtige i finanssektoren af flere årsager:<br><br>
                                        <ul>
                                             <li><strong>Regulatoriske krav:</strong> Finanssektoren er strengt reguleret. Dokumentation, risikovurdering og egnethedstests er lovpligtige elementer, der skal indarbejdes i salgsprocessen for at beskytte forbrugerne.</li>
                                             <li><strong>Etiske hensyn:</strong> Rådgiveren skal altid handle i kundens bedste interesse og være transparent omkring omkostninger. Dette er både et lovkrav og afgørende for tillidsopbygning.</li>
                                             <li><strong>Kompleksitet:</strong> Finansielle produkter er ofte komplicerede. Det er rådgiverens ansvar at forklare dem på kundens niveau.</li>
                                             <li><strong>Langsigtet perspektiv:</strong> Finansielle beslutninger har ofte langsigtede konsekvenser, og relationen mellem rådgiver og kunde strækker sig typisk over mange år.</li>
                                        </ul><br><br>
                                        <table class='info-table'w-100'>
                                             <tr><th>Hensyn</th><th>Betydning</th><th>Eksempel</th></tr>
                                             <tr><td>Regulatoriske krav</td><td>Lovmæssige forpligtelser</td><td>MiFID II kræver egnethedsvurdering ved investeringsrådgivning</td></tr>
                                             <tr><td>Etiske hensyn</td><td>Handle i kundens interesse</td><td>Anbefale produkter baseret på kundens behov, ikke provision</td></tr>
                                             <tr><td>Kompleksitet</td><td>Forståelig formidling</td><td>Forklare renterisiko ved variabelt forrentede lån i enkelt sprog</td></tr>
                                             <tr><td>Langsigtet perspektiv</td><td>Fokus på varige relationer</td><td>Årlige opfølgningsmøder om pensionsordning</td></tr>
                                        </table>">
                                   <div class="option"
                                        data-option="Regulatoriske krav, etiske hensyn, produktkompleksitet og langsigtet perspektiv"></div>
                                   <div class="option"
                                        data-option="Hurtig beslutningstagning, aggressive salgsteknikker og kortsigtet profit"></div>
                                   <div class="option"
                                        data-option="Kun at fokusere på kundens umiddelbare ønsker uden at se på langsigtet effekt"></div>
                                   <div class="option"
                                        data-option="At undgå at diskutere risici og omkostninger for ikke at skræmme kunden væk"></div>
                              </div>
                              
                              <!-- 7 -->
                              <div class="question"
                                   data-question="Hvad er formålet med fasen 'Indvendinger' i klassisk salg?"
                                   data-answer="2"
                                   data-explanation="Formålet med fasen 'Indvendinger' er at håndtere kundens bekymringer og spørgsmål gennem anerkendelse, uddybning og præsentation af alternativer.<br><br>
                                        Eksempel fra pensionsrådgivning: Når en kunde udtrykker bekymring om, hvorvidt en øget månedlig pensionsindbetaling er økonomisk overkommelig, vil rådgiveren først anerkende bekymringen ('Jeg forstår, at det er en væsentlig beslutning at øge din indbetaling'), derefter uddybe emnet (gennemgå kundens budget sammen med kunden) og til sidst præsentere alternativer (f.eks. en gradvis forøgelse af indbetalinger over tid).<br><br>
                                        <table class='info-table'w-100'>
                                             <tr><th>Trin i indvendingshåndtering</th><th>Formål</th><th>Eksempel</th></tr>
                                             <tr><td>Anerkendelse</td><td>Vise forståelse for kundens bekymring</td><td>'Jeg forstår din bekymring om renterisikoen'</td></tr>
                                             <tr><td>Uddybning</td><td>Udforske bekymringen nærmere</td><td>'Fortæl mig mere om, hvad der bekymrer dig ved variabel rente'</td></tr>
                                             <tr><td>Alternativer</td><td>Præsentere løsninger på bekymringen</td><td>'Vi kan også se på en kombination af fast og variabel rente'</td></tr>
                                        </table><br><br>
                                        Historien om 'Den Stædige Købmand' fra materialet illustrerer dette: Sælgeren anerkendte først købmandens indvending ('Jeg kan godt se, du er glad for det gamle, og det har tjent dig godt.'), gik tilbage til behovsafdækning ('Hvor lang tid bruger du hver aften på at gøre kassen op?') og præsenterede derefter løsningen med fokus på benefits ('Med det nye apparat tager det fem minutter. Hvad ville du bruge den ekstra tid på hver dag?').">
                                   <div class="option"
                                        data-option="At argumentere mod kundens synspunkter"></div>
                                   <div class="option"
                                        data-option="At ignorere kundens bekymringer og fortsætte med salgsprocessen"></div>
                                   <div class="option"
                                        data-option="At håndtere kundens bekymringer og spørgsmål gennem anerkendelse og uddybning"></div>
                                   <div class="option"
                                        data-option="At give rabat på produktet for at overvinde modstand"></div>
                              </div>
                              
                              <!-- 8 -->
                              <div class="question"
                                   data-question="Hvad er hovedformålet med fasen 'Afslutning' i klassisk salg?"
                                   data-answer="3"
                                   data-explanation="Hovedformålet med afslutningsfasen er at guide kunden mod en beslutning og aftale næste skridt gennem opsummering, handlingsplan og opfølgning.<br><br>
                                        Eksempel fra boligrådgivning: Efter at have gennemgået lånemuligheder og håndteret kundens bekymringer, afslutter rådgiveren mødet ved at opsummere de vigtigste punkter ('Baseret på jeres situation og behov, har vi set på et fastforrentet lån på 2,5% og et F5-lån'), præsenterer en handlingsplan ('Jeg sender en forhåndsgodkendelse til jer i løbet af dagen') og aftaler opfølgning ('Lad os mødes igen, når I har fundet et hus, I er interesserede i').<br><br>
                                        <table class='info-table'w-100'>
                                             <tr><th>Element</th><th>Formål</th><th>Eksempel</th></tr>
                                             <tr><td>Opsummering</td><td>Gennemgå hovedpunkter</td><td>'Vi har talt om tre investeringsmuligheder med fokus på balanceret risiko'</td></tr>
                                             <tr><td>Handlingsplan</td><td>Klarlægge næste skridt</td><td>'Jeg forbereder dokumenterne til underskrift'</td></tr>
                                             <tr><td>Opfølgning</td><td>Sikre kontinuitet</td><td>'Vi mødes igen om tre måneder for at justere strategien'</td></tr>
                                        </table><br><br>
                                        En god afslutningsfase sikrer, at både kunden og rådgiveren har en klar forståelse af, hvad der er aftalt, og hvordan de skal gå videre derfra. Dette er særligt vigtigt i finanssektoren, hvor beslutningsprocesser ofte er komplekse og strækker sig over flere møder.">
                                   <div class="option"
                                        data-option="At få kunden til at underskrive en kontrakt uanset hvad"></div>
                                   <div class="option"
                                        data-option="At afslutte mødet så hurtigt som muligt"></div>
                                   <div class="option"
                                        data-option="At introducere nye produkter i sidste øjeblik"></div>
                                   <div class="option"
                                        data-option="At guide kunden mod en beslutning og aftale næste skridt"></div>
                              </div>
                              
                              <!-- 9 -->
                              <div class="question"
                                   data-question="Hvilket værktøj bruges til struktureret notetagning under behovsafdækning?"
                                   data-answer="0"
                                   data-explanation="Aktivt lyttekort bruges til struktureret notetagning under behovsafdækning. Det er et værktøj, der hjælper rådgiveren med at organisere og dokumentere vigtige informationer om kundens situation, behov og bekymringer.<br><br>
                                        Eksempel: Under en samtale med en kunde om pensionsplanlægning kan rådgiveren bruge et aktivt lyttekort til at notere nøgleoplysninger som kundens nuværende alder (55 år), ønsket pensionsalder (67 år), nuværende opsparing (1,2 mio.), månedlige indbetaling (3.000 kr.) og bekymringer (om opsparingen er tilstrækkelig).<br><br>
                                        <table class='info-table'w-100'>
                                             <tr><th>Værktøj</th><th>Anvendelse</th><th>Fordel</th></tr>
                                             <tr><td>Aktivt lyttekort</td><td>Struktureret notetagning</td><td>Sikrer at vigtige oplysninger ikke glemmes</td></tr>
                                             <tr><td>FAB-analyse</td><td>Præsentation af produktfordele</td><td>Kobler produktegenskaber til kundebehov</td></tr>
                                             <tr><td>Spørgeteknikker</td><td>Forskellige typer spørgsmål</td><td>Hjælper med at udforske forskellige aspekter af kundens situation</td></tr>
                                        </table><br><br>

                              <!-- 10 -->
                              <div class="question"
                                   data-question="Hvad er en typisk fejl i kontaktfasen af klassisk salg?"
                                   data-answer="2"
                                   data-explanation="En typisk fejl i kontaktfasen er for meget smalltalk, hvilket kan føre til spild af tid og manglende professionalisme. I stedet bør rådgiveren bruge kort, relevant smalltalk, der leder naturligt til emnet.<br><br>
                                        Eksempel på for meget smalltalk: En rådgiver bruger de første 15 minutter af et møde på at tale om vejret, sport og ferieplaner uden at skabe en forbindelse til det finansielle emne. Dette kan virke uprofessionelt og give kunden indtrykket af, at deres tid ikke respekteres.<br><br>
                                        Eksempel på passende smalltalk: En rådgiver bemærker kundens rejsebilleder på telefonen og spørger kort ind til deres seneste ferie (2-3 minutter), og leder derefter naturligt samtalen videre: 'Det lyder som en fantastisk oplevelse. Apropos planlægning, lad os tale om, hvordan vi kan planlægge for din økonomiske fremtid.'<br><br>
                                        <table class='info-table'w-100'>
                                             <tr><th>Fase</th><th>Typisk fejl</th><th>Konsekvens</th><th>Bedre tilgang</th></tr>
                                             <tr><td>Kontakt</td><td>For meget smalltalk</td><td>Spild af tid, manglende professionalisme</td><td>Kort, relevant smalltalk der leder naturligt til emnet</td></tr>
                                        </table><br><br>
                                        Balancen er vigtig: For lidt smalltalk kan føre til en kold, upersonlig start, mens for meget kan virke uprofessionelt og ineffektivt. Målet er at etablere rapport og tryghed, samtidig med at mødet forbliver fokuseret og målrettet.">

                              <div class="question"
                                   data-question="Hvilken historisk salgsmodel kan de fem faser i klassisk salg spores tilbage til?"
                                   data-answer="3"
                                   data-explanation="De fem faser i klassisk salg kan spores tilbage til AIDA-modellen (Attention, Interest, Desire, Action), som blev udviklet i starten af 1900-tallet. Den klassiske model er en videreudvikling, der lægger mere vægt på dialog og behov.<br><br>
                                        AIDA står for:<br>
                                        <ul>
                                             <li><strong>A</strong>ttention (Opmærksomhed): Fange kundens opmærksomhed</li>
                                             <li><strong>I</strong>nterest (Interesse): Skabe interesse for produktet</li>
                                             <li><strong>D</strong>esire (Ønske): Vække et ønske om at eje produktet</li>
                                             <li><strong>A</strong>ction (Handling): Få kunden til at handle</li>
                                        </ul><br>
                                        AIDA-modellen fokuserer primært på at guide kunden gennem en psykologisk proces. Den moderne klassiske salgsmodel har udviklet sig til at inkludere mere dialog og fokus på kundens behov, hvilket afspejles i faserne Behovsafdækning og Indvendinger.<br><br>
                                        <table class='info-table'w-100'>
                                             <tr><th>AIDA</th><th>Klassisk salg</th><th>Forskel</th></tr>
                                             <tr><td>Attention</td><td>Kontakt</td><td>Mere fokus på at skabe relation</td></tr>
                                             <tr><td>Interest</td><td>Behovsafdækning</td><td>Mere fokus på kundens behov</td></tr>
                                             <tr><td>Desire</td><td>Løsningspræsentation</td><td>Mere skræddersyet til behov</td></tr>
                                             <tr><td>Action</td><td>Indvendinger + Afslutning</td><td>Mere dialog om bekymringer</td></tr>
                                        </table><br><br>
                                        Denne udvikling afspejler en generel bevægelse i salgstilgange fra produktfokus til kundefokus gennem det 20. århundrede.">
                                   <div class="option"
                                        data-option="SPIN-modellen"></div>
                                   <div class="option"
                                        data-option="4P-marketingmodellen"></div>
                                   <div class="option"
                                        data-option="FAB-modellen"></div>
                                   <div class="option"
                                        data-option="AIDA-modellen"></div>
                              </div>

                              <div class="question"
                                   data-question="Hvilke nøgleaktiviteter indgår i behovsafdækningsfasen?"
                                   data-answer="2"
                                   data-explanation="Nøgleaktiviteterne i behovsafdækningsfasen er åbne spørgsmål, aktiv lytning og notetagning.<br><br>
                                        Disse aktiviteter er centrale for at sikre en grundig forståelse af kundens situation og behov:<br><br>
                                        <ul>
                                             <li><strong>Åbne spørgsmål:</strong> Spørgsmål der ikke kan besvares med ja/nej, men kræver uddybende svar. F.eks. 'Hvordan ser I jeres økonomi udvikle sig over de næste 5 år?' eller 'Hvilke overvejelser har I gjort jer om pensionsopsparing?'</li>
                                             <li><strong>Aktiv lytning:</strong> At lytte opmærksomt til kundens svar, vise interesse gennem kropssprog, nikke, og stille opfølgende spørgsmål. Evt. også parafrasere kundens svar for at bekræfte forståelse.</li>
                                             <li><strong>Notetagning:</strong> Systematisk dokumentation af vigtige informationer, ofte ved hjælp af et aktivt lyttekort eller en anden struktureret metode.</li>
                                        </ul><br>
                                        Eksempel fra boligrådgivning: Rådgiveren stiller åbne spørgsmål som 'Hvilke områder kigger I på?', 'Hvordan ser jeres økonomi ud på længere sigt?' og 'Hvad bekymrer jer mest ved boligkøbet?'. Samtidig lytter rådgiveren aktivt og tager strukturerede noter om parrets situation, ønsker og bekymringer.<br><br>
                                        <table class='info-table'w-100'>
                                             <tr><th>Aktivitet</th><th>Formål</th><th>Eksempel</th></tr>
                                             <tr><td>Åbne spørgsmål</td><td>Få dybdegående information</td><td>'Hvad er jeres planer for fremtiden?'</td></tr>
                                             <tr><td>Aktiv lytning</td><td>Vise interesse og opfange nuancer</td><td>Øjenkontakt, nikke, opsummere</td></tr>
                                             <tr><td>Notetagning</td><td>Dokumentere vigtig information</td><td>Skrive kundens nøgleprioriteringer ned</td></tr>
                                        </table><br><br>
                                        En grundig behovsafdækning danner fundamentet for de efterfølgende faser og er afgørende for at kunne præsentere relevante, skræddersyede løsninger.">
